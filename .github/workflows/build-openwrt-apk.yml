name: Build OpenWrt APK

on:
  workflow_dispatch:
    inputs:
      openwrt_release:
        description: OpenWrt release version
        required: true
        default: "25.12.2"
  push:
    branches:
      - main
      - master
    paths:
      - "lucky/**"
      - "luci-app-lucky/**"
      - ".github/workflows/build-openwrt-apk.yml"
  pull_request:
    paths:
      - "lucky/**"
      - "luci-app-lucky/**"
      - ".github/workflows/build-openwrt-apk.yml"

permissions:
  contents: write

concurrency:
  group: build-openwrt-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      OPENWRT_RELEASE: ${{ github.event.inputs.openwrt_release || '25.12.2' }}
      OPENWRT_TARGET: x86
      OPENWRT_SUBTARGET: 64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve package metadata
        id: pkg
        shell: bash
        run: |
          set -euo pipefail

          lucky_version="$(sed -n 's/^PKG_VERSION:=//p' lucky/Makefile | head -n1)"
          if [[ -z "${lucky_version}" ]]; then
            echo "Failed to resolve lucky package version" >&2
            exit 1
          fi

          echo "version=${lucky_version}" >> "${GITHUB_OUTPUT}"

      - name: Resolve SDK URL
        id: sdk
        shell: bash
        run: |
          set -euo pipefail

          sdk_base="https://downloads.openwrt.org/releases/${OPENWRT_RELEASE}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}"
          sdk_file="$(
            curl -fsSL "${sdk_base}/" \
              | grep -oE "openwrt-sdk-${OPENWRT_RELEASE}-${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}[^\"']*Linux-x86_64\.tar\.zst" \
              | head -n1
          )"

          if [[ -z "${sdk_file}" ]]; then
            echo "Failed to find SDK under ${sdk_base}" >&2
            exit 1
          fi

          echo "sdk_base=${sdk_base}" >> "${GITHUB_OUTPUT}"
          echo "sdk_file=${sdk_file}" >> "${GITHUB_OUTPUT}"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            file \
            flex \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            rsync \
            upx-ucl \
            unzip \
            wget \
            zlib1g-dev \
            zstd

      - name: Cache SDK archive
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: .cache/openwrt/openwrt-sdk.tar.zst
          key: sdk-${{ env.OPENWRT_RELEASE }}-${{ env.OPENWRT_TARGET }}-${{ env.OPENWRT_SUBTARGET }}-${{ steps.sdk.outputs.sdk_file }}

      - name: Download SDK archive
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .cache/openwrt
          curl -fL "${{ steps.sdk.outputs.sdk_base }}/${{ steps.sdk.outputs.sdk_file }}" -o .cache/openwrt/openwrt-sdk.tar.zst

      - name: Download and extract SDK
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p sdk
          tar --zstd -xf .cache/openwrt/openwrt-sdk.tar.zst -C sdk --strip-components=1

      - name: Update feeds
        working-directory: sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy package sources into SDK
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p sdk/package/lucky
          cp -r lucky sdk/package/lucky/
          cp -r luci-app-lucky sdk/package/lucky/

      - name: Prepare build configuration
        working-directory: sdk
        run: make defconfig

      - name: Build lucky packages
        working-directory: sdk
        run: |
          make -j"$(nproc)" package/lucky/lucky/compile V=s
          make -j"$(nproc)" package/lucky/luci-app-lucky/compile V=s

      - name: Collect build artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          arch="$(find sdk/bin/packages -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | head -n1)"
          if [[ -z "${arch}" ]]; then
            echo "Failed to detect package arch under sdk/bin/packages" >&2
            exit 1
          fi
          echo "Detected arch: ${arch}"

          count=0
          while IFS= read -r -d '' file; do
            base="$(basename "${file}")"
            name="${base%.*}"
            ext="${base##*.}"
            cp "${file}" "dist/${name}_${arch}.${ext}"
            count=$((count + 1))
          done < <(find sdk/bin/packages -type f \
            \( -name "lucky-*.apk" -o -name "lucky_*.ipk" \
               -o -name "luci-app-lucky-*.apk" -o -name "luci-app-lucky_*.ipk" \
               -o -name "luci-i18n-lucky-*.apk" -o -name "luci-i18n-lucky-*.ipk" \) \
            -print0)

          if [[ "${count}" -eq 0 ]]; then
            echo "No lucky package artifacts found" >&2
            exit 1
          fi

          ls -lh dist

          max_size=$((25 * 1024 * 1024))
          oversized=0
          while IFS= read -r -d '' file; do
            size="$(stat -c%s "${file}")"
            if (( size > max_size )); then
              echo "${file} is over the Cloudflare Pages 25 MiB file limit (${size} bytes)" >&2
              oversized=1
            fi
          done < <(find dist -type f -print0)
          if (( oversized )); then
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lucky-x86_64-${{ steps.pkg.outputs.version }}
          path: dist/
          compression-level: 0
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: Lucky ${{ steps.pkg.outputs.version }}
          body: |
            Lucky ${{ steps.pkg.outputs.version }} for OpenWrt x86_64.

            Built with OpenWrt SDK ${{ env.OPENWRT_RELEASE }}.
          prerelease: false
          make_latest: true
          overwrite_files: true
          files: dist/*
          fail_on_unmatched_files: true
