name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v2.27.2)
        required: true
      openwrt_release:
        description: OpenWrt release version
        required: true
        default: "25.12.2"
      prerelease:
        description: Mark as pre-release
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (x86/64)
    runs-on: ubuntu-24.04
    env:
      OPENWRT_RELEASE: ${{ github.event.inputs.openwrt_release || '25.12.2' }}
      OPENWRT_TARGET: x86
      OPENWRT_SUBTARGET: "64"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve SDK URL
        id: sdk
        shell: bash
        run: |
          set -euo pipefail

          sdk_base="https://downloads.openwrt.org/releases/${OPENWRT_RELEASE}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}"
          sdk_file="$(
            curl -fsSL "${sdk_base}/" \
              | grep -oE "openwrt-sdk-${OPENWRT_RELEASE}-${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}[^\"']*Linux-x86_64\.tar\.zst" \
              | head -n1
          )"

          if [[ -z "${sdk_file}" ]]; then
            echo "Failed to find SDK under ${sdk_base}" >&2
            exit 1
          fi

          echo "sdk_base=${sdk_base}" >> "${GITHUB_OUTPUT}"
          echo "sdk_file=${sdk_file}" >> "${GITHUB_OUTPUT}"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            file \
            flex \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            rsync \
            unzip \
            wget \
            zlib1g-dev \
            zstd

      - name: Cache SDK archive
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: .cache/openwrt/openwrt-sdk.tar.zst
          key: sdk-${{ env.OPENWRT_RELEASE }}-${{ env.OPENWRT_TARGET }}-${{ env.OPENWRT_SUBTARGET }}-${{ steps.sdk.outputs.sdk_file }}

      - name: Download SDK archive
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .cache/openwrt
          curl -fL "${{ steps.sdk.outputs.sdk_base }}/${{ steps.sdk.outputs.sdk_file }}" -o .cache/openwrt/openwrt-sdk.tar.zst

      - name: Extract SDK
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p sdk
          tar --zstd -xf .cache/openwrt/openwrt-sdk.tar.zst -C sdk --strip-components=1

      - name: Update feeds
        working-directory: sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy package sources into SDK
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p sdk/package/lucky
          cp -r lucky sdk/package/lucky/
          cp -r luci-app-lucky sdk/package/lucky/

      - name: Prepare build configuration
        working-directory: sdk
        run: make defconfig

      - name: Build lucky packages
        working-directory: sdk
        run: |
          make -j"$(nproc)" package/lucky/lucky/compile V=s
          make -j"$(nproc)" package/lucky/luci-app-lucky/compile V=s

      - name: Collect build artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          find sdk/bin/packages -type f \( -name "*.apk" -o -name "*.ipk" \) -exec cp {} dist/ \;
          ls -lh dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lucky-x86_64
          path: dist/
          compression-level: 0
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "No release tag resolved" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: lucky-x86_64
          path: release

      - name: List release files
        shell: bash
        run: ls -lh release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: release/*
          fail_on_unmatched_files: true
